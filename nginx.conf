server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (hemat bandwidth, page load lebih cepat)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Asset Vite punya hash di nama (cth: index-abc123.js), aman di-cache lama
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: route apapun yg nggak ada filenya → serve index.html
    # Biar React Router yang handle routing client-side (/clients/healthylife-clinic dll)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers dasar
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
