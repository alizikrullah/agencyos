steps:
  # 1. Build image — inject env VITE_* sebagai --build-arg.
  #    Vite "membakar" nilainya ke bundle saat `npm run build` di dalam Docker.
  #    Nama substitution disamakan dgn yg di-set pada trigger:
  #      _NEON_DATABASE_URL  &  _GEMINI_API_KEY
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_NEON_DATABASE_URL=$_NEON_DATABASE_URL'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=$_GEMINI_API_KEY'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agencyos:latest'
      - '.'

  # 2. Push image ke Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agencyos:latest'

  # 3. Deploy image ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'agencyos'
      - '--image'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agencyos:latest'
      - '--region'
      - 'asia-southeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agencyos:latest'

substitutions:
  _NEON_DATABASE_URL: ''
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  # Trigger membawa variable bawaan (_AR_*, _SERVICE_NAME, dll) yg tak dipakai
  # config ini — ALLOW_LOOSE supaya build tidak error karena variable nganggur.
  substitution_option: 'ALLOW_LOOSE'
